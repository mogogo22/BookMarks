<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مختصراتي</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-grid"></div>
  <div class="bg-glow"></div>

  <div class="container">
    <header class="header">
      <div class="header-title">
        <div class="logo-icon">⚡</div>
        <h1>مختصراتي</h1>
        <p class="subtitle">روابطك المفضلة في متناول يدك</p>
      </div>
      <button class="add-btn" id="addBtn">
        <span class="add-btn-icon">+</span>
        <span class="add-btn-text">إضافة مختصر</span>
        <div class="add-btn-glow"></div>
      </button>
    </header>

    <div class="shortcuts-grid" id="shortcutsGrid">
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🔗</div>
        <p>لا يوجد مختصرات بعد</p>
        <span>اضغط على "إضافة مختصر" للبدء</span>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modal">
      <div class="modal-header">
        <h2 id="modalTitle">إضافة مختصر جديد</h2>
        <button class="modal-close" id="modalClose">✕</button>
      </div>
      <div class="modal-body">
        <div class="field">
          <label>🔗 الرابط <span class="required">*</span></label>
          <input type="url" id="inputUrl" placeholder="https://example.com" />
        </div>
        <div class="field">
          <label>✏️ الاسم</label>
          <input type="text" id="inputName" placeholder="اسم تلقائي برقم إن تُرك فارغاً" />
        </div>
        <div class="field">
          <label>📝 الوصف</label>
          <input type="text" id="inputDesc" placeholder="وصف قصير (اختياري)" />
        </div>
        <div class="field">
          <label>🎨 لون الزرار</label>
          <div class="color-picker">
            <div class="color-option selected" data-color="#6b7280" style="background:#6b7280" title="رمادي (افتراضي)"></div>
            <div class="color-option" data-color="#3b82f6" style="background:#3b82f6" title="أزرق"></div>
            <div class="color-option" data-color="#06b6d4" style="background:#06b6d4" title="سماوي"></div>
            <div class="color-option" data-color="#8b5cf6" style="background:#8b5cf6" title="بنفسجي"></div>
            <div class="color-option" data-color="#ec4899" style="background:#ec4899" title="وردي"></div>
            <div class="color-option" data-color="#10b981" style="background:#10b981" title="أخضر"></div>
            <div class="color-option" data-color="#f59e0b" style="background:#f59e0b" title="ذهبي"></div>
            <div class="color-option" data-color="#ef4444" style="background:#ef4444" title="أحمر"></div>
            <div class="color-option" data-color="#f97316" style="background:#f97316" title="برتقالي"></div>
            <div class="color-option" data-color="#14b8a6" style="background:#14b8a6" title="فيروزي"></div>
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-cancel" id="btnCancel">إلغاء</button>
        <button class="btn-save" id="btnSave">💾 حفظ</button>
      </div>
    </div>
  </div>

  <!-- Context Menu -->
  <div class="context-menu" id="contextMenu">
    <button class="ctx-item" id="ctxEdit">✏️ تعديل</button>
    <button class="ctx-item ctx-delete" id="ctxDelete">🗑️ حذف</button>
  </div>

  <script src="main.js"></script>
</body>
</html>
